version: "2.0"
name: "Dynamic Expert Collaboration Registry"
powered_by: "Hans(HanTaek) Lim"
description: "Continuous-availability expert team with collaborative task management and active prompt integration"
collaboration_model:
  availability_status: "continuous"  # all experts remain available throughout project
  engagement_model: "dynamic_summoning"  # experts can be summoned as needed
  collaboration_protocols:
    cross_expert_consultation: true
    iterative_re_engagement: true
    shared_context_tracking: true
  prompt_integration:
    mandatory_loading: true  # all experts must load their prompt files
    usage_validation: true  # LLM CLI must validate active prompt usage
    runtime_enforcement: true  # system enforces prompt guideline adherence

experts:
  pm:
    title: "Project Management Expert & Strategic Consultant"
    prompt: "prompts/pm.prompt.md"
    availability_status: "always_available"
    collaboration_role: "expert_consultant"
    primary_tasks: ["requirements_analysis", "iterative_refinement"]  # when specialized PM consultation needed
    collaborative_tasks: ["all_tasks"]  # can be summoned for PM expertise in any task
    prompt_validation_required: true
    orchestrator_note: "PM Orchestrator role is handled by default LLM CLI mode, PM Expert is summoned for specialized consultation"
    
    # Detailed Specialties
    specialties:
      strategic_analysis:
        - "complex_requirements_decomposition"
        - "stakeholder_alignment_facilitation" 
        - "project_risk_assessment_and_mitigation"
        - "resource_allocation_optimization"
        - "timeline_feasibility_analysis"
      
      collaboration_orchestration:
        - "cross_expert_conflict_resolution"
        - "expert_team_coordination_strategies"
        - "communication_protocol_design"
        - "collaborative_workflow_optimization"
        - "knowledge_transfer_facilitation"
      
      decision_framework:
        - "technical_vs_business_decision_classification"
        - "autonomous_decision_boundary_definition"
        - "strategic_consultation_trigger_identification"
        - "change_request_impact_analysis"
        - "quality_gate_establishment"
      
      memory_management:
        - "project_context_preservation"
        - "decision_rationale_documentation"
        - "expert_collaboration_history_tracking"
        - "iterative_improvement_analysis"
        - "project_continuity_assurance"
    knowledge:
      junie:
        - ".junie/project-management.md"
        - ".junie/guidelines.md"
      codex:
        - "project-management.md"
        - "AGENTS.md"
      claude:
        - "project-management.md"
        - "CLAUDE.md"
      gemini:
        - "project-management.md"
        - "GEMINI.md"
    outputs:
      - type: "analysis"
        format: "markdown"
      - type: "backlog"
        format: "yaml"
      - type: "task_assignments"
        format: "json"
    completion_signals:
      task_done: "[TASK_DONE:{task_id}:pm]"
      prompt_loaded: "[PROMPT_LOADED:pm]"
      collaboration_request: "[COLLAB_REQUEST:{task_id}]"
    responsibilities:
      core_duties:
        - "MANDATORY: Load prompts/pm.prompt.md and validate with [PROMPT_LOADED:pm] signal when summoned"
        - "Provide specialized PM consultation when summoned by PM Orchestrator or other experts"
        - "Deep requirements analysis using Sequential Thinking MCP for complex scenarios"
        - "Strategic planning and cross-expert facilitation when PM mediation is needed"
        - "Expert-level scope clarification and strategic advisory services"
      collaboration_duties:
        - "Respond to [COLLAB_REQUEST:{task_id}] with comprehensive PM expertise"
        - "Cross-expert consultation for complex scope/feasibility validation"
        - "Facilitate communication between experts when PM-level coordination is required"
        - "Provide strategic recommendations for complex project evolution scenarios"
      expert_consultation_duties:
        - "Support PM Orchestrator with specialized PM insights for complex decisions"
        - "Analyze complex strategic scenarios and change requests when summoned"
        - "Provide expert-level assessment of scope, timeline, and resource implications"
        - "Offer strategic insights for complex project scenarios and requirement evolution"
      re_engagement_triggers:
        - "PM Orchestrator requests specialized PM consultation"
        - "Other experts need PM-level scope clarification or strategic guidance"
        - "Complex requirement changes requiring expert-level PM analysis"
        - "Cross-expert conflicts requiring PM mediation and coordination"
