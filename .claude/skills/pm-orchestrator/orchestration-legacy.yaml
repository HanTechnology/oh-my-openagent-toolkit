  quality_assurance:
    primary_experts: ["qa"]
    collaborative_experts: ["frontend", "backend", "pm", "mcp"]
    prompt_files_required: ["prompts/qa-testing.prompt.md"]
    dependencies: ["deployment_pipeline"]
    actions:
      # PHASE 1: Expert Activation and Quality Assessment Setup
      - "Read prompts/qa-testing.prompt.md"
      - "Output: '✅ QA Expert activated for quality assurance: [PROMPT_LOADED:qa:VERIFIED]'"
      - "Read workspace/docs/architecture.md to understand quality requirements"
      - "Read workspace/docs/integration-report.md to understand system functionality"
      - "Read workspace/ops/deployment-guide.md to understand deployment configuration"
      - "Read .memory/active-context.md for current project context"
      - "Read quality-standards.json to establish quality targets and measurement protocols"

      # PHASE 2: Comprehensive Quality Standards Validation and Setup
      - "Read quality-standards.json and .memory/active-context.md to identify project type:"
      - "Extract quality framework for detected project type (web_application, ai_ml_system, mobile_application, etc.)"
      - "Establish quality validation protocol based on project-specific standards:"
      - "For Web Application projects:"
      - "  - Code quality targets: TypeScript coverage >95%, test coverage >80%, lint score >95%"
      - "  - Performance targets: Core Web Vitals (LCP<2.5s, FID<100ms, CLS<0.1), Lighthouse scores >90"
      - "  - Security targets: 0 high/critical vulnerabilities, authentication compliance, data validation"
      - "  - Accessibility targets: WCAG 2.1 AA compliance, screen reader compatibility"
      - "For AI/ML System projects:"
      - "  - Model performance: accuracy >90%, inference latency <100ms, memory usage <2GB"
      - "  - Data quality: completeness >95%, accuracy >98%, consistency >99%"
      - "  - Model reliability: robustness testing, interpretability, ethical compliance"
      - "For API/Microservice projects:"
      - "  - API design: REST compliance, complete OpenAPI documentation"
      - "  - Performance: response time <200ms, throughput >1000 RPS, availability 99.9%"
      - "  - Security: JWT/OAuth2 authentication, RBAC authorization, encryption compliance"
      - "Create quality validation checklist with specific measurement commands and thresholds"
      - "Setup quality gate enforcement: block deployment if critical quality standards fail"

      # PHASE 3: Test Environment Setup and Playwright MCP Configuration
      - "Setup comprehensive testing environment:"
      - "  - Configure Playwright MCP for automated E2E testing (never external packages)"
      - "  - Setup test data and database seeding for consistent testing"
