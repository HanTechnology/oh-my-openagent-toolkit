version: "2.0"
name: "Dynamic Task-Based Expert Collaboration Hub"
description: "Replaces waterfall approach with dynamic expert team and collaborative task management"
powered_by: "Hans(HanTaek) Lim"

pm_orchestrator:
  role: "Project Management Orchestrator"
  mode: "default"
  responsibilities:
    - "Overall project coordination and task creation"
    - "Expert assignment and workflow management"
    - "Memory management via .memory/ folder"
    - "Autonomous technical decision making"
    - "PM Expert task delegation when consultation needed"
  authority: "autonomous_technical_decisions"
  user_consultation_boundary: "strategic_business_decisions_only"

globals:
  input_contracts:
    user_req: "user_req.yaml"  # path to normalized user requirements
  core_references:
    team_config: "team.yaml"  # expert definitions and responsibilities
    requirements: "user_req.yaml"  # project requirements and constraints
    workflow_definition: "orchestration.yaml"  # this orchestration definition
  conventions:
    task_completion_regex: "\\[TASK_DONE:[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+\\]"  # pattern: [TASK_DONE:task_id:expert_id]
    collaboration_signal: "\\[COLLAB_REQUEST:[a-zA-Z0-9_-]+\\]"  # expert requests collaboration
    prompt_validation: "\\[PROMPT_LOADED:[a-zA-Z0-9_-]+\\]"  # expert confirms prompt file usage
    artifact_manifest: ".artifacts.manifest.json"  # manifest of generated artifacts
    task_registry: ".tasks.registry.json"  # active and completed task tracking
    collaboration_log: ".collaboration.log.md"  # expert interaction history
  max_task_instances: 100  # prevent infinite task creation
  mandatory_notes:
    - "All experts must continuously reference the three core_references files throughout the project lifecycle"
    - "All experts must load and actively use their prompts/*.prompt.md files - validation required"
    - "PM orchestrates dynamic task assignment and expert team based on evolving project needs"
    - "Experts remain available for re-engagement, collaboration, and iterative refinement throughout project"
    - ".memory/ folder and Sequential Thinking MCP actively utilized for decision tracking and context preservation"

expert_pool:
  availability_status: "all_available"  # all experts remain available throughout project
  active_tasks: []  # dynamically managed task assignments
  collaboration_active: true  # enables cross-expert collaboration

task_types:
  requirements_analysis:
    orchestrator_initiated: true  # PM Orchestrator creates and assigns this task
    primary_experts: ["pm"]  # PM Expert role when specialized consultation needed
    collaborative_experts: ["research", "fullstack", "qa", "mcp"]  # can be summoned for consultation
    prompt_files_required: ["prompts/pm.prompt.md"]
    workflow:
      - "PM Orchestrator initiates requirements analysis and assigns PM Expert if specialized consultation needed"
      - "PM Orchestrator manages .memory/ folder updates throughout process"
      - "PM Expert provides specialized analysis when summoned by PM Orchestrator"
    actions:
      # PHASE 1: Expert Activation and Memory Template Initialization
      - "Read prompts/pm.prompt.md"
      - "Output: '✅ PM Expert activated for requirements analysis: [PROMPT_LOADED:pm:VERIFIED]'"
      - "Initialize project-specific memory system:"
      - "  - Read memory-templates.yaml"
      - "  - Read project-detection.yaml to get project type and memory_template"
      - "  - Extract appropriate memory template (web-app, ai-system, mobile-app, etc.)"
      - "  - Create project-specific memory files based on template core_files:"
      - "    - For web application: .memory/ui-components.md, .memory/api-endpoints.md, .memory/user-flows.md"
      - "    - For AI/ML system: .memory/model-architecture.md, .memory/data-pipeline.md, .memory/training-requirements.md"
      - "    - For mobile app: .memory/platform-requirements.md, .memory/performance-targets.md"
      - "    - For data system: .memory/data-flow-architecture.md, .memory/processing-pipeline.md"
      - "    - For API service: .memory/service-architecture.md, .memory/endpoint-specifications.md"
      - "    - For desktop app: .memory/platform-integration.md, .memory/ui-framework.md"
      - "  - Populate each file with template_content from memory-templates.yaml"
      - "Read .memory/active-context.md to understand current project context"

      # PHASE 2: Requirements Analysis Execution
      - "Use Sequential Thinking MCP to systematically analyze user requirements:"
      - "  - Break down user request into functional and non-functional requirements"
      - "  - Identify ambiguities and assumptions in requirements"
      - "  - Determine project scope and boundaries"
      - "  - Assess technical complexity and feasibility"

      # PHASE 3: Cross-Expert Collaboration (if needed)
      - "If technical feasibility questions arise, execute: '[COLLAB_REQUEST:requirements_analysis]'"
      - "When collaboration requested:"
      - "  - Read prompts/research.prompt.md (for market analysis)"
      - "  - Read prompts/fullstack.prompt.md (for technical feasibility)"
      - "  - Update .memory/collaboration.log.md with consultation details"

      # PHASE 4: Documentation and Deliverables
      - "Write workspace/docs/analysis.md with:"
      - "  - Clear functional requirements list"
      - "  - Non-functional requirements (performance, security, scalability)"
      - "  - Identified risks and mitigation strategies"
      - "  - Technical assumptions and constraints"
      - "  - Project scope definition and exclusions"
      - "Write workspace/backlog/epics.yaml with:"
      - "  - Epic-level user stories"
      - "  - Priority ordering"
      - "  - Estimated complexity"
      - "  - Dependencies between epics"

      # PHASE 5: Memory System Updates
      - "Edit .memory/active-context.md with:"
      - "  - Updated current_phase: 'requirements_completed'"
      - "  - Next milestone: 'architecture_design'"
      - "  - Key requirements summary"
      - "Edit .memory/project-state.json expert_engagement_status:"
      - "  - Update pm.current_tasks with completion status"
      - "  - Record collaboration effectiveness if applicable"
      - "Edit .memory/decisions.md with:"
      - "  - Requirements-related decisions and rationale"
      - "  - Technical constraint decisions"

    produces:
      - "workspace/docs/analysis.md"           # Comprehensive requirements analysis
      - "workspace/backlog/epics.yaml"         # Epic-level project backlog
      - ".memory/active-context.md"  # Updated project context
      - ".memory/project-state.json" # Updated expert engagement status
      - ".memory/decisions.md"       # Requirements-related decisions

    completion_criteria:
      - "All deliverable files created with actual content (not templates)"
      - "Requirements clarity achieved (no major ambiguities remaining)"
      - "Technical feasibility confirmed through expert consultation if needed"
      - "Memory system updated with requirements analysis results"
      - "Output: '[TASK_DONE:requirements_analysis:pm]'"

    verification_steps:
      - "Confirm workspace/docs/analysis.md contains specific, actionable requirements"
      - "Verify workspace/backlog/epics.yaml has prioritized epic list"
      - "Check .memory/active-context.md reflects requirements completion"
      - "Ensure next task (architecture_design) can proceed with clear input"

  research_analysis:
    primary_experts: ["research"]
    collaborative_experts: ["pm", "fullstack", "qa", "mcp"]  # can be summoned for consultation
    prompt_files_required: ["prompts/research.prompt.md"]
    parallel_allowed: ["requirements_analysis"]  # can run simultaneously with requirements analysis
    actions:
      # PHASE 1: Expert Activation and Research Scope Definition
      - "Read prompts/research.prompt.md"
      - "Output: '✅ Research Expert activated for strategic analysis: [PROMPT_LOADED:research:VERIFIED]'"
      - "Read .memory/active-context.md to understand current project context"
      - "If requirements_analysis is running parallel: Read workspace/docs/analysis.md for requirement context"
      - "Define research scope based on project type and requirements"

      # PHASE 2: Market and Competitive Analysis
      - "Conduct comprehensive market research using GitHub MCP and Context7 MCP:"
      - "  - Search GitHub for similar projects and implementation patterns"
      - "  - Analyze popular repositories in the project domain"
      - "  - Research current technology trends and adoption rates"
      - "  - Identify market leaders and best practices"
      - "Execute competitive analysis:"
      - "  - Analyze competitor features and implementation approaches"
      - "  - Research market positioning and differentiation strategies"
      - "  - Identify opportunities and competitive advantages"
      - "  - Document market landscape and target user analysis"

      # PHASE 3: Technology Stack Research and Analysis
      - "Perform comprehensive technology stack analysis:"
      - "  - Research framework options and compatibility matrix"
      - "  - Analyze performance benchmarks and scalability characteristics"
      - "  - Evaluate learning curve and community support"
      - "  - Research integration capabilities and ecosystem maturity"
      - "Execute comparative technology assessment:"
      - "  - Compare pros/cons of different technology choices"
      - "  - Analyze cost implications and licensing considerations"
      - "  - Research security and compliance characteristics"
      - "  - Document recommended technology stack with rationale"

      # PHASE 4: Architecture Pattern Research
      - "Research architecture patterns and design approaches:"
      - "  - Analyze design patterns suitable for project type"
      - "  - Research scalability and performance patterns"
      - "  - Study security architecture best practices"
      - "  - Investigate deployment and infrastructure patterns"
      - "Execute architecture feasibility analysis:"
      - "  - Evaluate pattern complexity vs. project requirements"
      - "  - Research implementation examples and case studies"
      - "  - Analyze maintainability and evolution considerations"
      - "  - Document recommended architecture patterns with rationale"

      # PHASE 5: Risk Assessment and Implementation Strategy
      - "Conduct comprehensive risk assessment:"
      - "  - Identify technical risks and mitigation strategies"
      - "  - Analyze timeline and resource allocation risks"
      - "  - Research market and competitive risks"
      - "  - Evaluate technology adoption and obsolescence risks"
      - "Develop implementation methodology recommendations:"
      - "  - Research development workflow best practices"
      - "  - Analyze testing and quality assurance strategies"
      - "  - Study deployment and DevOps methodologies"
      - "  - Document recommended implementation approach"

      # PHASE 6: Expert Collaboration for Strategic Validation
      - "Execute '[COLLAB_REQUEST:research_analysis]' for strategic alignment:"
      - "When collaboration requested:"
      - "  - With pm expert: Validate business alignment and strategic priorities"
      - "  - With fullstack expert: Confirm technical feasibility and architecture alignment"
      - "  - With qa expert: Validate quality and testing strategy recommendations"
      - "  - With mcp expert: Optimize research tool usage and methodology"
      - "  - Update .memory/collaboration.log.md with validation discussions"

      # PHASE 7: Cross-Domain Research Validation and Integration
      - "Validate research findings across expert domains:"
      - "  - Confirm technology choices align with expert capabilities"
      - "  - Validate architecture patterns match implementation expertise"
      - "  - Ensure risk mitigation aligns with project constraints"
      - "  - Verify implementation methodology fits team skills"
      - "Integrate research findings with project requirements:"
      - "  - Align research recommendations with business objectives"
      - "  - Validate market research supports project positioning"
      - "  - Ensure competitive analysis informs feature priorities"

      # PHASE 8: Research Documentation and Strategic Recommendations
      - "Generate comprehensive research documentation:"
      - "  - Write .memory/market-analysis.md with:"
      - "    - Market landscape overview and competitive positioning"
      - "    - Target user analysis and market opportunities"
      - "    - Competitive feature analysis and differentiation strategies"
      - "    - Market trends and future considerations"
      - "  - Write .memory/tech-stack-analysis.md with:"
      - "    - Technology comparison matrix and evaluation criteria"
      - "    - Recommended technology stack with detailed rationale"
      - "    - Performance benchmarks and scalability analysis"
      - "    - Integration capabilities and ecosystem considerations"
      - "  - Write .memory/architecture-patterns.md with:"
      - "    - Recommended architecture patterns and design approaches"
      - "    - Scalability and performance considerations"
      - "    - Security and compliance architecture recommendations"
      - "    - Implementation examples and best practices"
      - "  - Write .memory/risk-assessment.md with:"
      - "    - Comprehensive risk analysis and probability assessment"
      - "    - Mitigation strategies and contingency planning"
      - "    - Timeline and resource risk evaluation"
      - "    - Technology and market risk considerations"
      - "  - Write .memory/implementation-options.md with:"
      - "    - Development methodology recommendations"
      - "    - Testing and quality assurance strategy"
      - "    - Deployment and DevOps approach recommendations"
      - "    - Team structure and skill requirements"
      - "  - Write .memory/research-summary.md with:"
      - "    - Executive summary of key findings and recommendations"
      - "    - Strategic priorities and implementation roadmap"
      - "    - Success metrics and validation criteria"
      - "    - Next steps and decision points"
      - "Edit .memory/active-context.md with:"
      - "  - Updated research_phase: 'research_analysis_completed'"
      - "  - Key research findings and strategic recommendations"
      - "  - Technology and architecture decisions informed by research"
      - "Edit .memory/project-state.json expert_engagement_status:"
      - "  - Update research.current_tasks with completion status"
      - "  - Record collaboration effectiveness and strategic alignment"
      - "Edit .memory/decisions.md with:"
      - "  - Research-based decisions and strategic rationale"
      - "  - Technology stack and architecture pattern selections"

    produces:
      - ".memory/market-analysis.md"         # Market landscape and competitive analysis
      - ".memory/tech-stack-analysis.md"     # Technology evaluation and recommendations
      - ".memory/architecture-patterns.md"   # Architecture design patterns and approaches
      - ".memory/risk-assessment.md"         # Risk analysis and mitigation strategies
      - ".memory/implementation-options.md"  # Development methodology recommendations
      - ".memory/research-summary.md"        # Executive summary and strategic roadmap
      - ".memory/active-context.md"           # Updated project context
      - ".memory/project-state.json"          # Updated expert engagement status
      - ".memory/decisions.md"                # Research-based decisions

    completion_criteria:
      - "Comprehensive market and competitive analysis completed"
      - "Technology stack evaluation and recommendations documented"
      - "Architecture patterns researched and validated with experts"
      - "Risk assessment completed with mitigation strategies"
      - "Implementation methodology recommendations provided"
      - "All research deliverables generated with expert validation"
      - "Strategic insights documented and aligned with project objectives"
      - "Memory system updated with research findings and decisions"
      - "Output: '[TASK_DONE:research_analysis:research]'"

    verification_steps:
      - "Confirm all research documents contain actionable insights and recommendations"
      - "Verify technology and architecture recommendations align with expert capabilities"
      - "Check risk assessment covers all major project risks with mitigation strategies"
      - "Ensure research findings support informed decision-making for project progression"

  architecture_design:
    primary_experts: ["fullstack"]
    collaborative_experts: ["pm", "backend", "frontend", "systemdev"]
    prompt_files_required: ["prompts/fullstack.prompt.md"]
    dependencies: ["requirements_analysis"]
    actions:
      # PHASE 1: Expert Activation and Context Loading
      - "Read prompts/fullstack.prompt.md"
      - "Output: '✅ Fullstack Expert activated for architecture design: [PROMPT_LOADED:fullstack:VERIFIED]'"
      - "Read workspace/docs/analysis.md to understand requirements"
      - "Read workspace/backlog/epics.yaml to understand project scope"
      - "Read .memory/active-context.md for current project context"

      # PHASE 2: Architecture Analysis and Planning
      - "Use Sequential Thinking MCP to systematically design architecture:"
      - "  - Analyze functional requirements for system components"
      - "  - Determine data flow and integration patterns"
      - "  - Identify performance and scalability requirements"
      - "  - Assess security and compliance needs"
      - "  - Evaluate technology stack suitability"

      # PHASE 3: Component Architecture Design
      - "Design Frontend Architecture:"
      - "  - Component hierarchy and routing structure"
      - "  - State management strategy (if complex state needed)"
      - "  - UI/UX patterns and responsive design approach"
      - "  - Performance optimization strategies (code splitting, lazy loading)"
      - "Design Backend Architecture:"
      - "  - API endpoint structure and RESTful design"
      - "  - Database schema and relationships"
      - "  - Authentication and authorization strategy"
      - "  - Business logic organization and service layers"
      - "Design Integration Architecture:"
      - "  - Frontend-Backend communication patterns"
      - "  - Error handling and validation strategies"
      - "  - Real-time communication needs (WebSocket/SSE if needed)"
      - "  - File upload and media handling (if needed)"

      # PHASE 4: Expert Collaboration for Validation
      - "Execute '[COLLAB_REQUEST:architecture_design]' for expert validation:"
      - "When collaboration requested:"
      - "  - Read prompts/backend.prompt.md for backend feasibility validation"
      - "  - Read prompts/frontend.prompt.md for frontend feasibility validation"
      - "  - If complex system requirements detected: Read prompts/system-dev.prompt.md"
      - "  - Update .memory/collaboration.log.md with validation discussions"

      # PHASE 5: System Development Necessity Evaluation
      - "Assess if specialized system development is needed:"
      - "  - Check for AI/ML requirements in requirements analysis"
      - "  - Check for video processing, 3D conversion, streaming needs"
      - "  - Check for high-performance computing requirements"
      - "  - If system development needed: document in architecture for systemdev expert"

      # PHASE 6: Documentation and Specifications
      - "Write .memory/integration-architecture.md and .memory/service-architecture.md with:"
      - "  - System overview and component diagram"
      - "  - Frontend architecture: routing, components, state management"
      - "  - Backend architecture: API structure, database design, business logic"
      - "  - Data flow diagrams and integration patterns"
      - "  - Security architecture and authentication flows"
      - "  - Deployment architecture and infrastructure requirements"
      - "  - Performance considerations and optimization strategies"
      - "  - System development requirements (if applicable)"
      - "Write workspace/specs/openapi.yaml with:"
      - "  - Complete API endpoint specifications"
      - "  - Request/response schemas with validation rules"
      - "  - Authentication requirements per endpoint"
      - "  - Error response formats and status codes"

      # PHASE 7: Memory System Updates
      - "Edit .memory/active-context.md with:"
      - "  - Updated current_phase: 'architecture_completed'"
      - "  - Next milestone: 'implementation_ready'"
      - "  - Architecture decisions summary"
      - "Edit .memory/project-state.json expert_engagement_status:"
      - "  - Update fullstack.current_tasks with completion status"
      - "  - Record collaboration effectiveness with backend/frontend experts"
      - "Edit .memory/decisions.md with:"
      - "  - Architecture decisions and rationale"
      - "  - Technology stack selections and justification"
      - "  - Integration pattern choices"

    produces:
      - ".memory/integration-architecture.md and .memory/service-architecture.md"        # Comprehensive system architecture
      - "workspace/specs/openapi.yaml"          # Complete API specifications
      - ".memory/active-context.md"   # Updated project context
      - ".memory/project-state.json"  # Updated expert engagement status
      - ".memory/decisions.md"        # Architecture decisions

    completion_criteria:
      - "Architecture document covers all system components with clear design rationale"
      - "API specifications are complete and implementable"
      - "Frontend and backend experts have validated architectural feasibility"
      - "System development requirements identified (if applicable)"
      - "Memory system updated with architecture decisions"
      - "Output: '[TASK_DONE:architecture_design:fullstack]'"

    verification_steps:
      - "Confirm .memory/integration-architecture.md and .memory/service-architecture.md provides clear implementation guidance"
      - "Verify workspace/specs/openapi.yaml is valid and complete"
      - "Check that backend/frontend implementation can proceed independently"
      - "Ensure system development expert can proceed if specialized requirements exist"

  system_development:
    primary_experts: ["systemdev"]
    collaborative_experts: ["fullstack", "backend", "devops"]
    prompt_files_required: ["prompts/system-dev.prompt.md"]
    dependencies: ["architecture_design"]
    conditional: true  # only created if system requirements identified
    actions:
      # PHASE 1: Expert Activation and System Requirements Assessment
      - "Read prompts/system-dev.prompt.md"
      - "Output: '✅ SystemDev Expert activated for system development: [PROMPT_LOADED:systemdev:VERIFIED]'"
      - "Read .memory/integration-architecture.md and .memory/service-architecture.md to understand system requirements"
      - "Read .memory/technology-stack.md for technology recommendations (if available)"
      - "Read .memory/active-context.md for current project context"

      # PHASE 2: System Requirements Verification and Scope Definition
      - "Analyze and verify system development necessity:"
      - "  - Check for AI/ML processing requirements (model training, inference, data processing)"
      - "  - Identify video processing needs (encoding, streaming, real-time processing)"
      - "  - Assess 3D conversion requirements (model processing, rendering, optimization)"
      - "  - Evaluate high-performance computing needs (parallel processing, GPU acceleration)"
      - "  - Determine real-time streaming requirements (WebRTC, media server, CDN integration)"
      - "If no specialized system requirements identified:"
      - "  - Output: '⚠️ No specialized system development requirements identified'"
      - "  - Edit .memory/active-context.md: 'system_development: not_required'"
      - "  - Output: '[TASK_DONE:system_development:systemdev]' and exit task"

      # PHASE 3: System Architecture Design and Technology Selection
      - "If system development required, design system architecture:"
      - "  - Define system service architecture and component interaction"
      - "  - Select appropriate technologies for identified requirements:"
      - "    - AI/ML: Python, TensorFlow/PyTorch, scikit-learn, GPU acceleration (CUDA/OpenCL)"
      - "    - Video Processing: FFmpeg, OpenCV, MediaPipe, streaming protocols"
      - "    - 3D Processing: Blender API, Three.js, glTF optimization, mesh processing"
      - "    - Real-time Streaming: WebRTC, MediaSoup, RTMP, adaptive bitrate"
      - "  - Design data flow and integration patterns with backend services"
      - "  - Plan resource allocation and performance optimization strategies"

      # PHASE 4: System Service Implementation
      - "Implement core system services based on requirements:"
      - "For AI/ML Systems:"
      - "  - Read .memory/model-architecture.md for AI/ML specifications (if ai-system project)"
      - "  - Setup Python environment with ML frameworks"
      - "  - Implement model training/inference pipelines following .memory/model-architecture.md"
      - "  - Create data preprocessing and feature extraction modules"
      - "  - Setup model serving and API endpoints"
      - "For Video Processing Systems:"
      - "  - Setup FFmpeg processing pipelines"
      - "  - Implement OpenCV computer vision processing"
      - "  - Create video encoding and optimization workflows"
      - "  - Setup streaming protocol implementations"
      - "For 3D Processing Systems:"
      - "  - Setup Blender API automation scripts"
      - "  - Implement glTF model conversion and optimization"
      - "  - Create mesh processing and file format conversion"
      - "  - Setup Three.js integration and rendering optimization"
      - "For Real-time Streaming:"
      - "  - Setup WebRTC peer connection management"
      - "  - Implement MediaSoup server architecture"
      - "  - Configure RTMP streaming and adaptive bitrate"
      - "  - Setup CDN integration and edge distribution"

      # PHASE 5: Performance Optimization and GPU Acceleration
      - "Implement performance optimization and acceleration:"
      - "  - Setup GPU acceleration using CUDA or OpenCL"
      - "  - Implement parallel processing patterns"
      - "  - Optimize memory management and resource utilization"
      - "  - Configure compute shaders and heterogeneous computing"
      - "  - Setup performance profiling and monitoring"
      - "Execute system performance testing:"
      - "  - Benchmark processing performance and throughput"
      - "  - Test resource utilization and scaling characteristics"
      - "  - Validate latency and real-time processing requirements"
      - "  - Optimize bottlenecks and resource allocation"

      # PHASE 6: System Integration and API Development
      - "Develop system service APIs and integration points:"
      - "  - Create RESTful APIs for system service communication"
      - "  - Implement message queues and asynchronous processing"
      - "  - Setup file upload and processing workflows"
      - "  - Create real-time communication interfaces (WebSocket/SSE)"
      - "  - Implement error handling and fallback mechanisms"
      - "Integrate with backend services:"
      - "  - Create database models for system service data"
      - "  - Implement authentication and authorization for system APIs"
      - "  - Setup request validation and rate limiting"
      - "  - Configure monitoring and logging for system services"

      # PHASE 7: Expert Collaboration and System Validation
      - "Execute '[COLLAB_REQUEST:system_development]' for integration validation:"
      - "When collaboration requested:"
      - "  - With fullstack expert: Validate system architecture and integration patterns"
      - "  - With backend expert: Confirm API integration and data flow design"
      - "  - With devops expert: Plan deployment and infrastructure requirements"
      - "  - Update .memory/collaboration.log.md with validation results"

      # PHASE 8: Testing and System Validation
      - "Implement comprehensive system testing:"
      - "  - Unit tests for system processing modules"
      - "  - Integration tests for API endpoints and data flow"
      - "  - Performance tests for processing pipelines"
      - "  - Load tests for concurrent processing scenarios"
      - "  - End-to-end tests for complete system workflows"
      - "Execute system validation:"
      - "  - Validate processing accuracy and quality"
      - "  - Test error handling and recovery mechanisms"
      - "  - Verify performance meets requirements"
      - "  - Confirm integration with backend services"

      # PHASE 9: Documentation and System Specifications
      - "Generate comprehensive system documentation:"
      - "  - Write .memory/system-specs.md with:"
      - "    - System architecture overview and component diagrams"
      - "    - API documentation and integration guides"
      - "    - Performance characteristics and optimization details"
      - "    - Installation and setup instructions"
      - "    - Usage examples and workflow documentation"
      - "    - Troubleshooting guides and monitoring procedures"
      - "  - Write system/README.md with setup and deployment instructions"
      - "  - Document system dependencies and environment requirements"
      - "  - Create API documentation for system service endpoints"
      - "Edit .memory/active-context.md with:"
      - "  - Updated current_phase: 'system_development_completed'"
      - "  - System services implemented and integration points"
      - "  - Performance characteristics and optimization results"
      - "Edit .memory/project-state.json expert_engagement_status:"
      - "  - Update systemdev.current_tasks with completion status"
      - "  - Record system implementation complexity and performance metrics"
      - "Edit .memory/decisions.md with:"
      - "  - System development decisions and technology choices"
      - "  - Performance optimization strategies and trade-offs"

    produces:
      - "system/**"                   # Complete system service implementation
      - ".memory/system-specs.md"        # System architecture and API documentation
      - "workspace/system/README.md"            # System setup and deployment guide
      - ".memory/active-context.md"   # Updated project context
      - ".memory/project-state.json"  # Updated expert engagement status
      - ".memory/decisions.md"        # System development decisions

    completion_criteria:
      - "System requirements assessment completed (required or not required determined)"
      - "If not required: Task completed with proper documentation"
      - "If required: System services implemented according to specifications"
      - "Performance optimization and GPU acceleration configured (if applicable)"
      - "System APIs and integration points working correctly"
      - "Comprehensive testing passed for all system components"
      - "System documentation complete and deployment-ready"
      - "Expert collaboration validation completed successfully"
      - "Memory system updated with system development status"
      - "Output: '[TASK_DONE:system_development:systemdev]'"

    verification_steps:
      - "Confirm system requirements assessment is accurate and complete"
      - "If system development required: verify all specified services implemented"
      - "Check system performance meets requirements and optimization targets"
      - "Ensure system APIs integrate correctly with backend services"
      - "Validate system documentation is complete and deployment-ready"

  backend_implementation:
    primary_experts: ["backend"]
    collaborative_experts: ["fullstack", "systemdev", "qa", "mcp"]
    prompt_files_required: ["prompts/backend.prompt.md"]
    dependencies: ["architecture_design"]
    actions:
      # PHASE 1: Expert Activation and Architecture Review
      - "Read prompts/backend.prompt.md"
      - "Output: '✅ Backend Expert activated for implementation: [PROMPT_LOADED:backend:VERIFIED]'"
      - "Read .memory/integration-architecture.md and .memory/service-architecture.md to understand backend architecture"
