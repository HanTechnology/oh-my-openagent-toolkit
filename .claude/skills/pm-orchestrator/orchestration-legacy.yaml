      # PHASE 4: End-to-End Testing Implementation
      - "Implement comprehensive E2E testing using Playwright MCP:"
      - "  - Test all critical user journeys and workflows"
      - "  - Validate authentication and authorization flows"
      - "  - Test form submissions and data processing"
      - "  - Verify navigation and routing functionality"
      - "  - Test error scenarios and fallback mechanisms"
      - "Execute cross-browser compatibility testing:"
      - "  - Test functionality across Chrome, Firefox, Safari, Edge"
      - "  - Validate consistent behavior and appearance"
      - "  - Test responsive design across different screen sizes"
      - "  - Verify mobile device compatibility and touch interactions"

      # PHASE 5: Performance Testing and Core Web Vitals Validation
      - "Conduct comprehensive performance testing:"
      - "  - Measure Core Web Vitals (LCP, FID, CLS) using Playwright MCP"
      - "  - Test page load times and time to interactive"
      - "  - Analyze bundle sizes and loading performance"
      - "  - Test performance under various network conditions"
      - "Execute load testing and stress testing:"
      - "  - Test API performance under concurrent requests"
      - "  - Validate database performance under load"
      - "  - Test system behavior under high traffic scenarios"
      - "  - Measure response times and resource utilization"

      # PHASE 6: Accessibility Compliance Validation
      - "Implement comprehensive accessibility testing (WCAG 2.1 AA):"
      - "  - Automated accessibility scanning using Playwright MCP"
      - "  - Manual keyboard navigation testing"
      - "  - Screen reader compatibility testing"
      - "  - Color contrast and visual accessibility validation"
      - "  - Focus management and ARIA label verification"
      - "Generate accessibility compliance report:"
      - "  - Document compliance level and any violations"
      - "  - Provide remediation recommendations for accessibility issues"
      - "  - Validate assistive technology compatibility"

      # PHASE 7: Security Testing and Vulnerability Assessment
      - "Conduct security testing and vulnerability assessment:"
      - "  - Test authentication and authorization security"
      - "  - Validate input sanitization and XSS prevention"
      - "  - Test SQL injection and data validation security"
      - "  - Verify CSRF protection and security headers"
      - "  - Test API security and rate limiting"
      - "Execute security compliance validation:"
      - "  - Verify HTTPS implementation and certificate validation"
      - "  - Test data privacy and GDPR compliance"
      - "  - Validate session management and logout functionality"

      # PHASE 8: Expert Collaboration for Domain-Specific Testing
      - "Execute '[COLLAB_REQUEST:quality_assurance]' for expert validation:"
      - "When collaboration requested:"
      - "  - With frontend expert: Validate UI/UX functionality and responsive design"
      - "  - With backend expert: Confirm API testing and data integrity validation"
      - "  - With pm expert: Review quality findings and business requirement fulfillment"
      - "  - Update .memory/collaboration.log.md with validation results and expert feedback"

      # PHASE 9: Regression Testing and Integration Validation
      - "Execute comprehensive regression testing:"
